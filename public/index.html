<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Waevo</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cyan: #00f5ff;
      --pink: #ff2d6b;
      --purple: #7b2dff;
      --bg: #020810;
      --surface: #060e1a;
      --border: rgba(0,245,255,0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: #c0d8e8;
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Grid animado de fondo */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 8s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gridMove {
      0%   { background-position: 0 0; }
      100% { background-position: 50px 50px; }
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* Orbes de luz */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 10s ease-in-out infinite;
    }
    .orb1 { width: 500px; height: 500px; background: var(--cyan); top: -150px; left: -150px; }
    .orb2 { width: 400px; height: 400px; background: var(--purple); bottom: -100px; right: -100px; animation-delay: -4s; }
    .orb3 { width: 300px; height: 300px; background: var(--pink); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -7s; opacity: 0.07; }

    @keyframes orbFloat {
      0%, 100% { transform: scale(1) translate(0,0); }
      33%       { transform: scale(1.1) translate(20px, -20px); }
      66%       { transform: scale(0.95) translate(-15px, 15px); }
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      padding: 2rem;
      width: 100%;
    }

    /* Logo */
    .logo-wrap {
      text-align: center;
      animation: fadeDown 0.8s ease both;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 900;
      letter-spacing: 0.2em;
      background: linear-gradient(135deg, var(--cyan) 0%, var(--purple) 50%, var(--pink) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(0,245,255,0.4));
      position: relative;
    }

    /* Glitch effect en el logo */
    .logo::before,
    .logo::after {
      content: 'WAEVO';
      position: absolute;
      top: 0; left: 0; right: 0;
      background: inherit;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo::before {
      animation: glitch1 4s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
    }
    .logo::after {
      animation: glitch2 4s infinite;
      clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
    }

    @keyframes glitch1 {
      0%, 90%, 100% { transform: none; opacity: 0; }
      92% { transform: translateX(-3px); opacity: 0.8; filter: hue-rotate(90deg); }
      94% { transform: translateX(3px); opacity: 0.8; }
      96% { transform: none; opacity: 0; }
    }
    @keyframes glitch2 {
      0%, 90%, 100% { transform: none; opacity: 0; }
      93% { transform: translateX(3px); opacity: 0.8; filter: hue-rotate(-90deg); }
      95% { transform: translateX(-3px); opacity: 0.8; }
      97% { transform: none; opacity: 0; }
    }

    .tagline {
      margin-top: 0.4rem;
      font-size: 0.7rem;
      letter-spacing: 0.5em;
      color: var(--cyan);
      opacity: 0.5;
      text-transform: uppercase;
    }

    /* Card principal */
    .card {
      background: rgba(6,14,26,0.85);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 700px;
      position: relative;
      animation: fadeUp 0.8s 0.2s ease both;
      box-shadow:
        0 0 0 1px rgba(0,245,255,0.04),
        0 0 80px rgba(0,245,255,0.06),
        inset 0 1px 0 rgba(0,245,255,0.08);
    }

    /* Línea superior brillante */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      animation: scanLine 3s ease-in-out infinite;
    }

    @keyframes scanLine {
      0%, 100% { opacity: 0.3; left: 10%; right: 10%; }
      50%       { opacity: 1; left: 5%; right: 5%; }
    }

    /* Esquinas decorativas */
    .corner { position: absolute; width: 16px; height: 16px; border-color: var(--cyan); border-style: solid; opacity: 0.5; }
    .corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
    .corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
    .corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    /* Input */
    .input-group {
      position: relative;
      margin: 2rem 0;
    }

    input {
      width: 100%;
      padding: 1.2rem 1.5rem;
      font-size: 1.1rem;
      background: rgba(2,8,16,0.7);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: #e0f0ff;
      font-family: inherit;
      transition: all 0.3s;
      outline: none;
    }

    input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 20px rgba(0,245,255,0.15);
      background: rgba(2,8,16,0.9);
    }

    input::placeholder {
      color: rgba(192,216,232,0.4);
    }

    /* Botón */
    button {
      width: 100%;
      padding: 1.2rem;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      color: #000;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.4s;
      text-transform: uppercase;
      box-shadow: 0 0 30px rgba(0,245,255,0.3);
      position: relative;
      overflow: hidden;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 50px rgba(0,245,255,0.5);
    }

    button::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: 0.7s;
    }

    button:hover::before {
      left: 100%;
    }

    /* Quick links */
    .quick-links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 1.2rem;
      width: 100%;
      max-width: 700px;
      margin-top: 1rem;
    }

    .quick-btn {
      padding: 1rem;
      background: rgba(6,14,26,0.6);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: #c0d8e8;
      text-align: center;
      text-decoration: none;
      font-size: 0.95rem;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }

    .quick-btn:hover {
      background: rgba(0,245,255,0.08);
      border-color: var(--cyan);
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    /* Footer */
    footer {
      margin-top: 4rem;
      font-size: 0.8rem;
      opacity: 0.5;
      text-align: center;
      letter-spacing: 0.1em;
    }

    /* Animaciones de entrada */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .container { padding: 1.5rem; }
      .card { padding: 2rem 1.5rem; }
      .logo { font-size: clamp(2.8rem, 12vw, 5rem); }
    }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="container">
    <div class="logo-wrap">
      <h1 class="logo">WAEVO</h1>
      <div class="tagline">Navegación sin límites · Privado · Seguro</div>
    </div>

    <div class="card">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>

      <div style="text-align: center; margin-bottom: 1.5rem;">
        <div style="font-size: 1.8rem; font-weight: bold; margin-bottom: 0.5rem; color: var(--cyan);">
          CONECTANDO...
        </div>
        <div style="font-size: 0.95rem; opacity: 0.7;">
          // Ingresa una URL o búsqueda
        </div>
      </div>

      <div class="input-group">
        <input type="text" id="urlInput" placeholder="https://ejemplo.com o busca algo..." autocomplete="off" autofocus/>
      </div>

      <button id="connectBtn">ENTRAR</button>

      <div style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem; opacity: 0.6;">
        PROXY ACTIVO · ULTRAVIOLET · ENCRIPTADO
      </div>
    </div>

    <div class="quick-links">
      <a href="#" class="quick-btn">Google</a>
      <a href="#" class="quick-btn">YouTube</a>
      <a href="#" class="quick-btn">Reddit</a>
      <a href="#" class="quick-btn">Twitter</a>
      <a href="#" class="quick-btn">Discord</a>
      <a href="#" class="quick-btn">GitHub</a>
      <a href="#" class="quick-btn">Instagram</a>
      <a href="#" class="quick-btn">Spotify</a>
    </div>

    <footer>
      WAEVO PROXY · POWERED BY ULTRAVIOLET · BUILT BY ALEX
    </footer>
  </div>

  <script>
    // Este script probablemente se expande en producción o está en otro archivo
    // Por ahora solo un placeholder básico
    document.getElementById('connectBtn').addEventListener('click', () => {
      const input = document.getElementById('urlInput').value.trim();
      if (input) {
        alert('Conectando a: ' + input + '\n(la lógica real del proxy va aquí)');
        // Aquí iría la redirección real usando Ultraviolet
      }
    });

    // Permitir Enter para conectar
    document.getElementById('urlInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('connectBtn').click();
      }
    });
  </script>
</body>
</html>
