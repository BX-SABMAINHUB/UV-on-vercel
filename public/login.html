<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Waevo — Acceso</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cyan: #00f5ff;
      --pink: #ff2d6b;
      --purple: #7b2dff;
      --bg: #020810;
      --surface: #060e1a;
      --border: rgba(0,245,255,0.15);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content:'';position:fixed;inset:0;
      background-image:
        linear-gradient(rgba(0,245,255,0.04) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,245,255,0.04) 1px,transparent 1px);
      background-size:50px 50px;
      animation:gridMove 8s linear infinite;
      pointer-events:none;z-index:0;
    }
    @keyframes gridMove{0%{background-position:0 0}100%{background-position:50px 50px}}
    .orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.1;pointer-events:none;z-index:0;}
    .orb1{width:500px;height:500px;background:var(--cyan);top:-150px;left:-150px;}
    .orb2{width:400px;height:400px;background:var(--purple);bottom:-100px;right:-100px;}

    .card {
      position:relative;z-index:1;
      background:rgba(6,14,26,0.9);
      backdrop-filter:blur(20px);
      border:1px solid var(--border);
      border-radius:6px;
      padding:3rem 2.5rem;
      width:100%;max-width:400px;
      box-shadow:0 0 80px rgba(0,245,255,0.06);
      animation:fadeUp 0.6s ease both;
      text-align:center;
    }
    .card::before {
      content:'';position:absolute;
      top:0;left:10%;right:10%;height:1px;
      background:linear-gradient(90deg,transparent,var(--cyan),transparent);
    }
    .corner{position:absolute;width:14px;height:14px;border-color:var(--cyan);border-style:solid;opacity:0.5;}
    .corner.tl{top:-1px;left:-1px;border-width:2px 0 0 2px;}
    .corner.tr{top:-1px;right:-1px;border-width:2px 2px 0 0;}
    .corner.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px;}
    .corner.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}

    /* Bypass btn */
    .bypass-btn {
      position:absolute;top:1rem;right:1rem;
      background:rgba(0,245,255,0.05);
      border:1px solid rgba(0,245,255,0.15);
      border-radius:50%;width:32px;height:32px;
      color:var(--cyan);font-family:'Orbitron',sans-serif;
      font-size:0.75rem;font-weight:700;
      cursor:pointer;transition:all 0.2s;
      display:flex;align-items:center;justify-content:center;
    }
    .bypass-btn:hover{background:rgba(0,245,255,0.15);box-shadow:0 0 15px rgba(0,245,255,0.3);}

    .logo {
      font-family:'Orbitron',sans-serif;
      font-size:3rem;font-weight:900;
      letter-spacing:0.2em;
      background:linear-gradient(135deg,var(--cyan),var(--purple),var(--pink));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      filter:drop-shadow(0 0 25px rgba(0,245,255,0.4));
      margin-bottom:0.3rem;
    }
    .subtitle {
      font-size:0.6rem;letter-spacing:0.4em;
      color:rgba(0,245,255,0.3);text-transform:uppercase;
      margin-bottom:2.5rem;
    }

    /* Google button */
    .google-btn {
      display:flex;align-items:center;justify-content:center;gap:0.8rem;
      width:100%;padding:0.9rem 1.5rem;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:3px;
      color:#fff;font-family:'Share Tech Mono',monospace;
      font-size:0.85rem;letter-spacing:0.1em;
      cursor:pointer;text-decoration:none;
      transition:all 0.2s;
    }
    .google-btn:hover {
      background:rgba(255,255,255,0.1);
      border-color:rgba(255,255,255,0.3);
      box-shadow:0 0 20px rgba(255,255,255,0.08);
      transform:translateY(-1px);
    }
    .google-btn svg{width:20px;height:20px;flex-shrink:0;}

    .divider {
      display:flex;align-items:center;gap:1rem;
      margin:1.5rem 0;color:rgba(0,245,255,0.2);
      font-size:0.65rem;letter-spacing:0.2em;
    }
    .divider::before,.divider::after {
      content:'';flex:1;height:1px;
      background:rgba(0,245,255,0.1);
    }

    .footer-text {
      margin-top:2rem;font-size:0.58rem;
      letter-spacing:0.2em;color:rgba(0,245,255,0.15);
    }
    .footer-text span{color:var(--pink);}

    /* Modal bypass */
    .modal-bg {
      display:none;position:fixed;inset:0;
      background:rgba(2,8,16,0.85);
      backdrop-filter:blur(10px);
      z-index:10;align-items:center;justify-content:center;
    }
    .modal-bg.active{display:flex;}
    .modal {
      background:var(--surface);border:1px solid var(--border);
      border-radius:6px;padding:2rem;
      width:100%;max-width:300px;
      animation:fadeUp 0.3s ease both;
      position:relative;
    }
    .modal-title {
      font-family:'Orbitron',sans-serif;font-size:0.85rem;
      color:var(--cyan);letter-spacing:0.2em;
      margin-bottom:1.2rem;text-align:center;
    }
    .modal-close {
      position:absolute;top:0.8rem;right:0.8rem;
      background:none;border:none;
      color:rgba(0,245,255,0.3);font-size:1rem;cursor:pointer;
    }
    .modal-close:hover{color:var(--pink);}
    .field label {
      display:block;font-size:0.6rem;
      letter-spacing:0.3em;color:rgba(0,245,255,0.4);
      text-transform:uppercase;margin-bottom:0.4rem;
    }
    .field input {
      width:100%;background:rgba(0,245,255,0.04);
      border:1px solid rgba(0,245,255,0.2);border-radius:3px;
      color:var(--cyan);font-family:'Share Tech Mono',monospace;
      font-size:0.9rem;padding:0.75rem 1rem;
      outline:none;transition:all 0.2s;caret-color:var(--cyan);
    }
    .field input::placeholder{color:rgba(0,245,255,0.2);}
    .field input:focus{border-color:rgba(0,245,255,0.5);background:rgba(0,245,255,0.07);}
    .btn {
      width:100%;margin-top:0.8rem;
      background:linear-gradient(135deg,var(--cyan),var(--purple));
      border:none;border-radius:3px;color:#000;
      font-family:'Orbitron',sans-serif;font-size:0.65rem;
      font-weight:700;letter-spacing:0.15em;padding:0.85rem;
      cursor:pointer;text-transform:uppercase;transition:all 0.2s;
    }
    .btn:hover{filter:brightness(1.2);box-shadow:0 0 20px rgba(0,245,255,0.3);}
    .msg{margin-top:0.6rem;font-size:0.68rem;text-align:center;min-height:1rem;}
    .msg.error{color:var(--pink);}
    .msg.ok{color:#00ff88;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
  </style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- Modal bypass -->
<div class="modal-bg" id="bypassModal">
  <div class="modal">
    <button class="modal-close" onclick="closeBypass()">✕</button>
    <div class="modal-title">// ACCESO DIRECTO</div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="bypassInput" placeholder="••••••" onkeydown="if(event.key==='Enter')doBypass()"/>
    </div>
    <button class="btn" onclick="doBypass()">ENTRAR</button>
    <div class="msg" id="bypassMsg"></div>
  </div>
</div>

<div class="card">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <button class="bypass-btn" onclick="openBypass()" title="Acceso directo">P</button>

  <div class="logo">WAEVO</div>
  <div class="subtitle">Acceso seguro requerido</div>

  <a class="google-btn" href="/auth/google">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continuar con Google
  </a>

  <div class="divider">o</div>

  <div style="font-size:0.65rem;color:rgba(0,245,255,0.25);letter-spacing:0.1em;">
    Usa el botón <span style="color:var(--cyan);font-family:'Orbitron',sans-serif;font-size:0.7rem;">P</span> para acceso con contraseña
  </div>

  <div class="footer-text">
    WAEVO PROXY · BUILT BY <span>ALEX</span>
  </div>
</div>

<script>
  function openBypass() {
    document.getElementById('bypassModal').classList.add('active');
    setTimeout(() => document.getElementById('bypassInput').focus(), 100);
  }

  function closeBypass() {
    document.getElementById('bypassModal').classList.remove('active');
    document.getElementById('bypassInput').value = '';
    document.getElementById('bypassMsg').textContent = '';
  }

  async function doBypass() {
    const pass = document.getElementById('bypassInput').value.trim();
    const msg  = document.getElementById('bypassMsg');
    if (!pass) return;

    const res  = await fetch('/auth/bypass', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pass }),
    });
    const data = await res.json();

    if (data.ok) {
      msg.className = 'msg ok';
      msg.textContent = '✓ Acceso concedido';
      setTimeout(() => location.href = '/', 800);
    } else {
      msg.className = 'msg error';
      msg.textContent = '✗ Contraseña incorrecta';
    }
  }
</script>
</body>
</html>
