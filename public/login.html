<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Waevo — Acceso</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cyan: #00f5ff;
      --pink: #ff2d6b;
      --purple: #7b2dff;
      --bg: #020810;
      --surface: #060e1a;
      --border: rgba(0,245,255,0.15);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content:'';position:fixed;inset:0;
      background-image:
        linear-gradient(rgba(0,245,255,0.04) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,245,255,0.04) 1px,transparent 1px);
      background-size:50px 50px;
      animation:gridMove 8s linear infinite;
      pointer-events:none;z-index:0;
    }
    @keyframes gridMove{0%{background-position:0 0}100%{background-position:50px 50px}}
    body::after {
      content:'';position:fixed;inset:0;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);
      pointer-events:none;z-index:0;
    }
    .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;animation:orbFloat 10s ease-in-out infinite;}
    .orb1{width:500px;height:500px;background:var(--cyan);opacity:0.08;top:-150px;left:-150px;}
    .orb2{width:400px;height:400px;background:var(--purple);opacity:0.08;bottom:-100px;right:-100px;animation-delay:-4s;}
    .orb3{width:300px;height:300px;background:var(--pink);opacity:0.05;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-7s;}
    @keyframes orbFloat{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}

    .card {
      position:relative;z-index:1;
      background:rgba(6,14,26,0.92);
      backdrop-filter:blur(20px);
      border:1px solid var(--border);
      border-radius:6px;
      padding:3rem 2.5rem;
      width:100%;max-width:420px;
      text-align:center;
      animation:fadeUp 0.7s ease both;
      box-shadow:0 0 80px rgba(0,245,255,0.06),inset 0 1px 0 rgba(0,245,255,0.07);
    }
    .card::before {
      content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
      background:linear-gradient(90deg,transparent,var(--cyan),transparent);
      animation:scanLine 3s ease-in-out infinite;
    }
    @keyframes scanLine{0%,100%{opacity:0.3;left:10%;right:10%;}50%{opacity:1;left:4%;right:4%;}}

    .corner{position:absolute;width:14px;height:14px;border-color:var(--cyan);border-style:solid;opacity:0.45;}
    .corner.tl{top:-1px;left:-1px;border-width:2px 0 0 2px;}
    .corner.tr{top:-1px;right:-1px;border-width:2px 2px 0 0;}
    .corner.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px;}
    .corner.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}

    .bypass-btn {
      position:absolute;top:1rem;right:1rem;
      background:rgba(0,245,255,0.05);
      border:1px solid rgba(0,245,255,0.15);
      border-radius:50%;width:34px;height:34px;
      color:var(--cyan);font-family:'Orbitron',sans-serif;
      font-size:0.75rem;font-weight:700;
      cursor:pointer;transition:all 0.2s;
      display:flex;align-items:center;justify-content:center;
    }
    .bypass-btn:hover{background:rgba(0,245,255,0.15);box-shadow:0 0 16px rgba(0,245,255,0.4);}

    .logo {
      font-family:'Orbitron',sans-serif;
      font-size:3.2rem;font-weight:900;
      letter-spacing:0.2em;
      background:linear-gradient(135deg,var(--cyan),var(--purple),var(--pink));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      filter:drop-shadow(0 0 30px rgba(0,245,255,0.35));
      margin-bottom:0.3rem;
      display:inline-block;position:relative;
    }
    .logo::before,.logo::after{
      content:'WAEVO';position:absolute;top:0;left:0;right:0;
      background:inherit;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    }
    .logo::before{animation:glitch1 6s infinite;clip-path:polygon(0 0,100% 0,100% 35%,0 35%);}
    .logo::after{animation:glitch2 6s infinite;clip-path:polygon(0 65%,100% 65%,100% 100%,0 100%);}
    @keyframes glitch1{0%,88%,100%{transform:none;opacity:0;}90%{transform:translateX(-3px);opacity:0.8;}92%{transform:translateX(3px);opacity:0.6;}94%{opacity:0;}}
    @keyframes glitch2{0%,88%,100%{transform:none;opacity:0;}91%{transform:translateX(3px);opacity:0.8;}93%{transform:translateX(-3px);opacity:0.6;}95%{opacity:0;}}

    .subtitle{font-size:0.58rem;letter-spacing:0.45em;color:rgba(0,245,255,0.28);text-transform:uppercase;margin-bottom:2rem;}

    .status{display:flex;align-items:center;justify-content:center;gap:0.5rem;margin-bottom:2rem;font-size:0.58rem;color:rgba(0,245,255,0.22);letter-spacing:0.18em;}
    .dot{width:6px;height:6px;border-radius:50%;background:#00ff88;box-shadow:0 0 8px #00ff88;animation:blink 2s infinite;flex-shrink:0;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

    .login-btns{display:flex;flex-direction:column;gap:0.75rem;}

    .login-btn {
      display:flex;align-items:center;justify-content:center;gap:0.8rem;
      width:100%;padding:0.95rem 1.5rem;
      border-radius:3px;
      font-family:'Share Tech Mono',monospace;
      font-size:0.85rem;letter-spacing:0.07em;
      cursor:pointer;text-decoration:none;
      transition:all 0.25s;position:relative;overflow:hidden;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.1);
      color:#e8eaed;
    }
    .login-btn::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);
      transform:translateX(-100%);transition:transform 0.5s;
    }
    .login-btn:hover::before{transform:translateX(100%);}
    .login-btn:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.22);transform:translateY(-1px);}
    .login-btn:active{transform:scale(0.98);}
    .login-btn svg{width:20px;height:20px;flex-shrink:0;}

    .divider{display:flex;align-items:center;gap:1rem;margin:1.2rem 0;color:rgba(0,245,255,0.18);font-size:0.6rem;letter-spacing:0.25em;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(0,245,255,0.07);}

    .hint{font-size:0.6rem;color:rgba(0,245,255,0.2);letter-spacing:0.07em;}
    .hint span{color:rgba(0,245,255,0.6);font-family:'Orbitron',sans-serif;font-size:0.65rem;}

    .footer-text{margin-top:2rem;font-size:0.52rem;letter-spacing:0.25em;color:rgba(0,245,255,0.1);}
    .footer-text b{color:var(--pink);}

    .modal-bg{display:none;position:fixed;inset:0;background:rgba(2,8,16,0.88);backdrop-filter:blur(12px);z-index:10;align-items:center;justify-content:center;}
    .modal-bg.active{display:flex;}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:2.2rem;width:100%;max-width:300px;position:relative;animation:fadeUp 0.3s ease both;}
    .modal::before{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);}
    .mc{position:absolute;width:10px;height:10px;border-color:var(--cyan);border-style:solid;opacity:0.35;}
    .mc.tl{top:-1px;left:-1px;border-width:1px 0 0 1px;}
    .mc.tr{top:-1px;right:-1px;border-width:1px 1px 0 0;}
    .mc.bl{bottom:-1px;left:-1px;border-width:0 0 1px 1px;}
    .mc.br{bottom:-1px;right:-1px;border-width:0 1px 1px 0;}
    .modal-close{position:absolute;top:0.7rem;right:0.8rem;background:none;border:none;color:rgba(0,245,255,0.3);font-size:1rem;cursor:pointer;}
    .modal-close:hover{color:var(--pink);}
    .modal-title{font-family:'Orbitron',sans-serif;font-size:0.78rem;color:var(--cyan);letter-spacing:0.2em;margin-bottom:1.5rem;text-align:center;}
    .field{margin-bottom:0.8rem;}
    .field label{display:block;font-size:0.57rem;letter-spacing:0.3em;color:rgba(0,245,255,0.32);text-transform:uppercase;margin-bottom:0.4rem;}
    .field input{width:100%;background:rgba(0,245,255,0.04);border:1px solid rgba(0,245,255,0.16);border-radius:3px;color:var(--cyan);font-family:'Share Tech Mono',monospace;font-size:0.9rem;padding:0.75rem 1rem;outline:none;transition:all 0.2s;caret-color:var(--cyan);}
    .field input::placeholder{color:rgba(0,245,255,0.16);}
    .field input:focus{border-color:rgba(0,245,255,0.5);background:rgba(0,245,255,0.07);}
    .btn{width:100%;margin-top:0.5rem;background:linear-gradient(135deg,var(--cyan),var(--purple));border:none;border-radius:3px;color:#000;font-family:'Orbitron',sans-serif;font-size:0.65rem;font-weight:700;letter-spacing:0.15em;padding:0.85rem;cursor:pointer;text-transform:uppercase;transition:all 0.2s;}
    .btn:hover{filter:brightness(1.15);box-shadow:0 0 20px rgba(0,245,255,0.3);}
    .btn:active{transform:scale(0.98);}
    .msg{margin-top:0.7rem;font-size:0.67rem;text-align:center;min-height:1rem;}
    .msg.error{color:var(--pink);}
    .msg.ok{color:#00ff88;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
  </style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="modal-bg" id="bypassModal">
  <div class="modal">
    <div class="mc tl"></div><div class="mc tr"></div>
    <div class="mc bl"></div><div class="mc br"></div>
    <button class="modal-close" onclick="closeBypass()">✕</button>
    <div class="modal-title">// ACCESO DIRECTO</div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="bypassInput" placeholder="••••••" onkeydown="if(event.key==='Enter')doBypass()"/>
    </div>
    <button class="btn" onclick="doBypass()">ENTRAR</button>
    <div class="msg" id="bypassMsg"></div>
  </div>
</div>

<div class="card">
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>

  <button class="bypass-btn" onclick="openBypass()" title="Acceso directo">P</button>

  <div class="logo">WAEVO</div>
  <div class="subtitle">Acceso seguro requerido</div>

  <div class="status">
    <div class="dot"></div>
    <span>PROXY ACTIVO · SESIÓN REQUERIDA</span>
  </div>

  <div class="login-btns">

    <!-- Google -->
    <a class="login-btn" href="/auth/google">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continuar con Google
    </a>

    <!-- GitHub -->
    <a class="login-btn" href="/auth/github">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="white">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
      Continuar con GitHub
    </a>

    <!-- Discord -->
    <a class="login-btn" href="/auth/discord">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#5865F2">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.032.053a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
      </svg>
      Continuar con Discord
    </a>

  </div>

  <div class="divider">o</div>

  <div class="hint">
    Usa el botón <span>P</span> para acceso con contraseña
  </div>

  <div class="footer-text">
    WAEVO PROXY · BUILT BY <b>ALEX</b>
  </div>
</div>

<script>
  fetch('/auth/logout', { method: 'GET' }).catch(() => {});

  function openBypass() {
    document.getElementById('bypassModal').classList.add('active');
    setTimeout(() => document.getElementById('bypassInput').focus(), 100);
  }

  function closeBypass() {
    document.getElementById('bypassModal').classList.remove('active');
    document.getElementById('bypassInput').value = '';
    document.getElementById('bypassMsg').textContent = '';
    document.getElementById('bypassMsg').className = 'msg';
  }

  async function doBypass() {
    const pass = document.getElementById('bypassInput').value.trim();
    const msg  = document.getElementById('bypassMsg');
    if (!pass) return;
    try {
      const res  = await fetch('/auth/bypass', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pass }),
      });
      const data = await res.json();
      if (data.ok) {
        msg.className = 'msg ok';
        msg.textContent = '✓ Acceso concedido';
        setTimeout(() => location.href = '/', 800);
      } else {
        msg.className = 'msg error';
        msg.textContent = '✗ Contraseña incorrecta';
        document.getElementById('bypassInput').value = '';
        document.getElementById('bypassInput').focus();
      }
    } catch {
      msg.className = 'msg error';
      msg.textContent = '✗ Error de conexión';
    }
  }
</script>
</body>
</html>
